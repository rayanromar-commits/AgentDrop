# ===================================================================
# AgentDrop configuration
# Edit this file to control how AgentDrop behaves. No coding needed.
# Lines starting with '#' are comments (ignored by the program).
# Keep the indentation (spaces) exactly as shown — YAML cares about it.
# ===================================================================

# --- STORY SOURCING -------------------------------------------------
# Where stories come from:
#   manual  = read .txt files you drop into sourcing/manual_stories/
#             (use this until your Reddit API access is approved)
#   reddit  = pull live from the Reddit API (needs approved API keys)
story_source: manual

# Which subreddits to pull stories from. Add/remove as you like.
subreddits:
  - MaliciousCompliance
  - ProRevenge
  - pettyrevenge
  - entitledparents
  - tifu
  - AmItheAsshole
  - nosleep            # fictional horror stories
  - LetsNotMeet        # TRUE scary real-life encounters (great hook)
  - shortscarystories  # very short horror — fits the Shorts length well
  - confession         # personal confessions (high drama/engagement)

# How many top posts to look at per subreddit on each run.
posts_to_scan_per_subreddit: 25

# Pull from this time window: hour, day, week, month, year, all
reddit_time_filter: day

# --- SCREENING / FILTERING ------------------------------------------
# A story must fall within this word count to be used.
# Roughly 100-500 words ≈ a 30-60 second short.
min_word_count: 100
max_word_count: 500

# Skip posts flagged Not-Safe-For-Work by Reddit.
skip_nsfw: true

# Reject a story for profanity/slurs?
#   false = profanity is ALLOWED (your choice).
# NOTE: even with profanity allowed here, see the monetization warning
# in chat — strong language can limit YouTube ad revenue. We can later
# add an option to bleep/censor swear words in the audio only.
reject_profanity: false

# Words/phrases that REJECT a story. Case-insensitive, whole-word.
# Focused on graphic sexual content (your stated red line). The NSFW
# flag (skip_nsfw above) is the first net; this is the backup.
# Edit freely — add or remove anything. These target explicit sexual
# content specifically (profanity is allowed per reject_profanity).
extra_blocklist:
  - blowjob
  - handjob
  - cumshot
  - creampie
  - masturbat   # partial-word friendly variants
  - orgasm
  - bestiality
  - incest

# --- LONG-STORY SPLITTING -------------------------------------------
# Stories longer than one part get split into "Part 1", "Part 2", ...
# each its own video, published in order (oldest slot first).
splitting:
  enabled: true
  words_per_part: 375    # target length of each part (aim ~350-400)
  max_parts: 8           # stories needing more parts than this are skipped
                         # (avoids endless 10+ part series)

# --- VOICEOVER (TTS = Text To Speech) -------------------------------
voiceover:
  provider: elevenlabs        # which TTS service to use
  # AgentDrop rotates through the voices below, using a DIFFERENT voice
  # for each new story (a multi-part series keeps one narrator, then the
  # next story switches). Add/remove voices freely — paste any voice's
  # ID from your ElevenLabs Voice Library. The list rotates in order and
  # the position is remembered across restarts.
  # These IDs are ElevenLabs' built-in default voices (on every account).
  voices:
    - {name: Rachel, id: 21m00Tcm4TlvDq8ikWAM}   # clear US female
    - {name: Adam,   id: pNInz6obpgDQGcFmaJgB}   # deep US male
    - {name: Antoni, id: ErXwobaYiN019PkySvjV}   # warm US male
    - {name: Bella,  id: EXAVITQu4vr4xnSDxMaL}   # soft US female
    - {name: Josh,   id: TxGEqnHWrfWFTfGW9XjX}   # young US male
    - {name: Elli,   id: MF3mGyEYCl7XYWbV9V6O}   # emotive US female
    - {name: Sam,    id: yoZ06aMxZJJ28mfd3POQ}   # neutral US male
    - {name: Arnold, id: VR6AewLTigWG4xSOukaG}   # crisp US male
  # Fallback single voice (used only if the 'voices' list above is empty).
  voice_id: 21m00Tcm4TlvDq8ikWAM
  voice_name: Rachel          # just a human-readable label for logs
  model: eleven_turbo_v2_5    # cheaper/faster; good quality
  stability: 0.5              # 0-1: lower = more expressive, higher = steadier
  similarity_boost: 0.75      # 0-1: how closely to match the voice

# --- VIDEO / CAPTIONS -----------------------------------------------
video:
  width: 1080                 # vertical 9:16 dimensions
  height: 1920
  fps: 30
  # Encoding quality / size. Without a cap, busy stock footage ballooned to
  # ~100MB per clip. CRF is quality (lower = better/bigger; 23-28 typical);
  # max_bitrate caps the peak so files stay small with no visible loss on
  # phone screens.
  crf: 25
  max_bitrate: "3M"
  buf_size: "6M"

captions:
  font: DejaVu Sans          # bundled in video/fonts so captions render on cloud Linux
  font_size: 96
  font_color: white
  outline_color: black
  outline_width: 7            # thick outline so text stays legible on any footage
  shadow: 3                   # drop shadow for depth/pop
  pop: true                   # punch-in scale animation as each caption appears
  position: center            # center | lower-third
  words_per_caption: 3        # how many words to show at once

# --- REVIEW / APPROVAL ----------------------------------------------
# "manual" = you approve every video before upload (SAFE DEFAULT).
# "auto"   = uploads automatically with no approval. Don't switch to
#            this until you trust the output quality.
approval_mode: auto

# --- SCHEDULING -----------------------------------------------------
# Timezone for the upload_times below. On your Mac this is automatic,
# but in the cloud (Railway runs on UTC) you MUST set this to your zone
# so "09:00" means 9am YOUR time. Examples: America/New_York,
# America/Los_Angeles, Europe/London.
timezone: America/Chicago

# --- UPLOAD SCHEDULE ------------------------------------------------
upload:
  videos_per_day: 3
  # 24-hour clock, your computer's local time. One upload per time.
  upload_times:
    - "09:00"
    - "14:00"
    - "19:00"
  privacy_status: public      # private | unlisted | public
                              # PUBLIC: uploads are visible to everyone.
  category_id: "22"           # YouTube category. 22 = People & Blogs,
                              # 24 = Entertainment, 27 = Education.
  made_for_kids: false        # almost always false for these

# --- TIKTOK CROSS-POSTING -------------------------------------------
# Posts the same approved 9:16 videos to TikTok on its OWN schedule
# (independent of the YouTube times above). Needs TIKTOK_CLIENT_KEY /
# TIKTOK_CLIENT_SECRET in the env and a one-time authorization
# (python3 -m upload.tiktok_auth).
tiktok:
  enabled: false             # flip on after you've authorized (tiktok_auth)
  mode: inbox                # inbox  = push to TikTok drafts, you tap Post
                             #          (works BEFORE app audit)
                             # direct = auto-publish public (needs audit +
                             #          the video.publish scope)
  privacy_level: SELF_ONLY   # used by 'direct' mode once audited:
                             # PUBLIC_TO_EVERYONE | MUTUAL_FOLLOW_FRIENDS | SELF_ONLY
  videos_per_day: 3
  post_times:                # 24h clock, same timezone as YouTube
    - "10:00"
    - "15:00"
    - "20:00"

# --- PERFORMANCE-WEIGHTED SELECTION ---------------------------------
# Once enough data exists, bias story picking toward subreddits that
# perform well. The score is age-normalized (views/day since upload) and
# rewards engagement (likes + comments), so fast-climbing recent videos
# beat old ones that merely accumulated views over time.
use_performance_weighting: true
performance:
  boost: 3.0           # max points added to a story's score for a top subreddit
  prior_weight: 1.5    # shrinkage: higher = trust the global average more while
                       # samples are small (stops one viral video dominating)

# --- NOTIFICATIONS (daily Slack digest) -----------------------------
# Once a day, send a Slack message with channel totals + their deltas
# (yesterday / last week / last month), the top videos, and how many
# unused manual stories remain. Needs SLACK_WEBHOOK_URL set in the env.
notifications:
  enabled: true
  channel: slack             # slack (email support can be added later)
  digest_time: "20:00"       # 24h clock, Central (uses the scheduler timezone)
  top_n: 3                   # how many top videos to list
  restock_threshold: 5       # warn when unused stories <= this many

# --- SPENDING SAFEGUARDS (hard limits the agent will not cross) -----
safeguards:
  # Max videos AgentDrop will PRODUCE per day (each one spends TTS
  # credits). A hard ceiling even if something loops/misfires.
  max_videos_per_day: 3
  # Max TTS characters per calendar month. Set this AT or BELOW your
  # ElevenLabs plan so code stops before the plan does.
  # Rough guide: ~1,300 chars per video.
  #   Starter 30k  -> ~23 videos/mo  (set budget to 28000)
  #   Creator 121k -> ~90 videos/mo  (set budget to 115000)
  # >>> Set to 115000 ONLY after you upgrade to Creator. While still on
  #     Starter, change this to 28000 or you'll hit ElevenLabs errors. <<<
  monthly_tts_char_budget: 115000
