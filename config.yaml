# ===================================================================
# AgentDrop configuration
# Edit this file to control how AgentDrop behaves. No coding needed.
# Lines starting with '#' are comments (ignored by the program).
# Keep the indentation (spaces) exactly as shown — YAML cares about it.
# ===================================================================

# --- STORY SOURCING -------------------------------------------------
# Where stories come from:
#   manual  = read .txt files you drop into sourcing/manual_stories/
#             (use this until your Reddit API access is approved)
#   reddit  = pull live from the Reddit API (needs approved API keys)
story_source: manual

# Which subreddits to pull stories from. Add/remove as you like.
subreddits:
  - MaliciousCompliance
  - ProRevenge
  - pettyrevenge
  - entitledparents
  - tifu
  - AmItheAsshole
  - nosleep            # fictional horror stories
  - LetsNotMeet        # TRUE scary real-life encounters (great hook)
  - shortscarystories  # very short horror — fits the Shorts length well
  - confession         # personal confessions (high drama/engagement)

# How many top posts to look at per subreddit on each run.
posts_to_scan_per_subreddit: 25

# Pull from this time window: hour, day, week, month, year, all
reddit_time_filter: day

# --- SCREENING / FILTERING ------------------------------------------
# A story must fall within this word count to be used.
# Roughly 100-500 words ≈ a 30-60 second short.
min_word_count: 100
max_word_count: 500

# Skip posts flagged Not-Safe-For-Work by Reddit.
skip_nsfw: true

# Reject a story for profanity/slurs?
#   false = profanity is ALLOWED (your choice).
# NOTE: even with profanity allowed here, see the monetization warning
# in chat — strong language can limit YouTube ad revenue. We can later
# add an option to bleep/censor swear words in the audio only.
reject_profanity: false

# Words/phrases that REJECT a story. Case-insensitive, whole-word.
# Focused on graphic sexual content (your stated red line). The NSFW
# flag (skip_nsfw above) is the first net; this is the backup.
# Edit freely — add or remove anything. These target explicit sexual
# content specifically (profanity is allowed per reject_profanity).
extra_blocklist:
  - blowjob
  - handjob
  - cumshot
  - creampie
  - masturbat   # partial-word friendly variants
  - orgasm
  - bestiality
  - incest

# --- VOICEOVER (TTS = Text To Speech) -------------------------------
voiceover:
  provider: elevenlabs        # which TTS service to use
  # ElevenLabs picks voices by ID. This default is "Rachel" (clear,
  # neutral US female). Browse others in your ElevenLabs Voice Library
  # and paste the voice's ID here.
  voice_id: 21m00Tcm4TlvDq8ikWAM
  voice_name: Rachel          # just a human-readable label for logs
  model: eleven_turbo_v2_5    # cheaper/faster; good quality
  stability: 0.5              # 0-1: lower = more expressive, higher = steadier
  similarity_boost: 0.75      # 0-1: how closely to match the voice

# --- VIDEO / CAPTIONS -----------------------------------------------
video:
  width: 1080                 # vertical 9:16 dimensions
  height: 1920
  fps: 30

captions:
  font: Arial
  font_size: 90
  font_color: white
  outline_color: black
  outline_width: 6
  position: center            # center | lower-third
  words_per_caption: 3        # how many words to show at once

# --- REVIEW / APPROVAL ----------------------------------------------
# "manual" = you approve every video before upload (SAFE DEFAULT).
# "auto"   = uploads automatically with no approval. Don't switch to
#            this until you trust the output quality.
approval_mode: auto

# --- SCHEDULING -----------------------------------------------------
# Timezone for the upload_times below. On your Mac this is automatic,
# but in the cloud (Railway runs on UTC) you MUST set this to your zone
# so "09:00" means 9am YOUR time. Examples: America/New_York,
# America/Los_Angeles, Europe/London.
timezone: America/Chicago

# --- UPLOAD SCHEDULE ------------------------------------------------
upload:
  videos_per_day: 3
  # 24-hour clock, your computer's local time. One upload per time.
  upload_times:
    - "09:00"
    - "14:00"
    - "19:00"
  privacy_status: public      # private | unlisted | public
                              # PUBLIC: uploads are visible to everyone.
  category_id: "22"           # YouTube category. 22 = People & Blogs,
                              # 24 = Entertainment, 27 = Education.
  made_for_kids: false        # almost always false for these

# --- PERFORMANCE-WEIGHTED SELECTION ---------------------------------
# Once enough data exists, bias story picking toward subreddits that
# perform well. Stays neutral until videos accumulate real views.
use_performance_weighting: true

# --- SPENDING SAFEGUARDS (hard limits the agent will not cross) -----
safeguards:
  # Max videos AgentDrop will PRODUCE per day (each one spends TTS
  # credits). A hard ceiling even if something loops/misfires.
  max_videos_per_day: 3
  # Max TTS characters per calendar month. Set this AT or BELOW your
  # ElevenLabs plan so code stops before the plan does.
  # Rough guide: ~1,300 chars per video.
  #   Starter 30k  -> ~23 videos/mo  (set budget to 28000)
  #   Creator 121k -> ~90 videos/mo  (set budget to 115000)
  # >>> Set to 115000 ONLY after you upgrade to Creator. While still on
  #     Starter, change this to 28000 or you'll hit ElevenLabs errors. <<<
  monthly_tts_char_budget: 115000
